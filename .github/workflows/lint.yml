name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  qml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - name: qmllint
        run: nix develop --command bash -c 'find package/contents -name "*.qml" | xargs qmllint --unresolved-type info'

      - name: qmlformat check
        run: nix develop --command bash -c 'find package/contents -name "*.qml" | xargs qmlformat --dry-run 2>&1 | grep -q "would reformat" && echo "Files need formatting, run qmlformat -i" && exit 1 || true'
